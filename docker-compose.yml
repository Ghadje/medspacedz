version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: medspacedz-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medspacedz
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medspacedz-app
    restart: always
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/medspacedz?schema=public"
      NEXTAUTH_SECRET: "your-secret-key-here-at-least-32-chars-long"
      NEXTAUTH_URL: "http://localhost:3000"
    depends_on:
      - db

volumes:
  postgres_data:
